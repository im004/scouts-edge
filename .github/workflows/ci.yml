name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: scouts-edge/backend
        run: python -m pip install -e ".[dev]"
      - name: Lint backend
        working-directory: scouts-edge/backend
        run: ruff check app
      - name: Test backend
        working-directory: scouts-edge/backend
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scouts-edge/frontend/package.json
      - name: Install frontend
        working-directory: scouts-edge/frontend
        run: npm install
      - name: Build frontend
        working-directory: scouts-edge/frontend
        run: npm run build
